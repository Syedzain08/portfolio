    <meta

    />
    <meta name="theme-color" content="#f86e5b" />

    <link rel="canonical" href="{{ request.url }}" />

    <style>
      .testimonialsSwiper .swiper-button-prev,
      .testimonialsSwiper .swiper-button-next {
        position: static;
        width: 48px;
        height: 48px;
        margin: 0;
        flex-shrink: 0;

        display: flex;
        align-items: center;
        justify-content: center;

        border-radius: 9999px;
        cursor: pointer;

        background: rgba(248, 110, 91, 0.08);
        border: 1px solid rgba(248, 110, 91, 0.4);
        backdrop-filter: blur(6px);

        transition: all 0.25s ease;
      }

      .testimonialsSwiper .swiper-button-prev:hover,
      .testimonialsSwiper .swiper-button-next:hover {
        background: rgba(248, 110, 91, 0.18);
        border-color: #f86e5b;
        box-shadow: 0 8px 20px rgba(248, 110, 91, 0.25);
      }

      .testimonialsSwiper .swiper-button-prev:active,
      .testimonialsSwiper .swiper-button-next:active {
        transform: scale(0.95);
        box-shadow: 0 4px 10px rgba(248, 110, 91, 0.2);
      }

      .testimonialsSwiper .swiper-button-next::after,
      .testimonialsSwiper .swiper-button-prev::after {
        display: none;
      }

      .testimonialsSwiper .swiper-button-prev .material-symbols-outlined,
      .testimonialsSwiper .swiper-button-next .material-symbols-outlined {
        font-size: 22px;
        color: #f86e5b;
        transition: transform 0.2s ease;
      }

      .testimonialsSwiper .swiper-pagination {
        position: static;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .swiper-pagination-bullet {
        width: 6px;
        height: 6px;
        background: #f86e5b;
        opacity: 0.25;
        border-radius: 9999px;
        transition: all 0.3s ease;
      }

      .swiper-pagination-bullet-active {
        width: 26px;
        opacity: 1;
        box-shadow: 0 0 10px rgba(248, 110, 91, 0.6);
      }
    </style>

    <!-- Open Graph -->

  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Testimonials Swiper
      const testimonialSwiper = new Swiper(".testimonialsSwiper", {
        slidesPerView: 1,
        spaceBetween: 20,
        loop: true,
        autoplay: {
          delay: 5000,
          disableOnInteraction: false,
          pauseOnMouseEnter: true,
        },
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
      });
    });

    window.lightbox = GLightbox({
      selector: ".glightbox",
      touchNavigation: true,
      loop: true,
      autoplayVideos: true,
    });

    const underlineSections = document.querySelectorAll(".underline-animate");

    const observer = new IntersectionObserver(
      (entries, observer) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.5 },
    );

    underlineSections.forEach((underline) => observer.observe(underline));
    const experienceCards = document.querySelectorAll(
      ".reveal-left, .reveal-right",
    );

    const cardObserver = new IntersectionObserver(
      (entries, observer) => {
        entries.forEach((entry, index) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.classList.add("active");
            }, index * 500);

            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.2 },
    );

    experienceCards.forEach((card) => cardObserver.observe(card));
  </script>

  {% block scripts %}{% endblock %}
</html>
